# Prov 1 - Kravanpassat utkast

50 flervalsfrågor. Varje fråga har fyra alternativ och exakt ett rätt svar.

Fråga 1-20 fokuserar främst på grundkunskaper och enkla problem.  
Fråga 21-40 fokuserar mer på problemlösning, struktur, användare, tillgänglighet och val av lösning.  
Fråga 41-50 är svåra kodfrågor.

## Frågor 1-20

### 1. Vad är ett programmerbart system?
A. Ett system som kan styras med instruktioner eller kod
B. En vanlig bild utan logik
C. Ett dokument utan funktioner
D. En fil som inte kan ändras

**Rätt svar: A**

### 2. Vad används ett programspråk till?
A. Att bara skapa bilder
B. Att skriva instruktioner som datorn kan tolka och köra
C. Att ersätta all hårdvara
D. Att göra filer oläsliga

**Rätt svar: B**

### 3. Vilket alternativ beskriver bäst objektorienterad programmering?
A. Program får bara innehålla en funktion
B. Program måste alltid sakna variabler
C. Program byggs med objekt som kan ha data och metoder
D. Program skrivs utan struktur

**Rätt svar: C**

### 4. Vad är en variabel?
A. En loop som alltid körs
B. Ett felmeddelande
C. En databasfil
D. Ett namn som lagrar ett värde

**Rätt svar: D**

### 5. Vilken datatyp passar bäst för `True`?
A. Boolean
B. Heltal
C. Sträng
D. Lista

**Rätt svar: A**

### 6. Vad används `if` till?
A. Att skapa en textfil automatiskt
B. Att välja om kod ska köras beroende på ett villkor
C. Att sortera alla variabler
D. Att rita UML-diagram

**Rätt svar: B**

### 7. Vad används en loop till?
A. Att alltid avsluta programmet
B. Att skapa en databas utan kod
C. Att upprepa kod
D. Att byta programspråk

**Rätt svar: C**

### 8. Vad är en funktion?
A. Ett värde som aldrig ändras
B. En knapp i databasen
C. En typ av fel
D. En namngiven koddel som kan återanvändas

**Rätt svar: D**

### 9. Vad är en parameter?
A. Ett värde som skickas in till en funktion eller metod
B. En kommentar i koden
C. Ett namn på en databas
D. Ett färdigt GUI

**Rätt svar: A**

### 10. Vad är en lista?
A. En enskild textsträng
B. En samling värden i ordning
C. En SQL-tabell
D. En klass utan metoder

**Rätt svar: B**

### 11. När passar en dictionary bra?
A. När programmet inte behöver spara data
B. När allt ska vara en enda sträng
C. När värden ska kunna hittas med nycklar
D. När man vill undvika struktur

**Rätt svar: C**

### 12. Vad är en klass?
A. Ett fel i en loop
B. En rad utskrift
C. En textfil
D. En mall för objekt

**Rätt svar: D**

### 13. Vad är ett objekt?
A. En instans skapad från en klass
B. Ett annat namn för `print()`
C. En kommentar
D. En SQL-fråga

**Rätt svar: A**

### 14. Vad gör `try` och `except`?
A. Skapar alltid en ny klass
B. Hanterar fel som kan uppstå när programmet körs
C. Sorterar en lista
D. Ritar ett GUI

**Rätt svar: B**

### 15. Vad används en textfil ofta till?
A. Att automatiskt skapa objekt
B. Att ersätta all felhantering
C. Att spara enkel textdata mellan körningar
D. Att köra API-anrop

**Rätt svar: C**

### 16. Vad används SQLite till?
A. Att skriva kommentarer
B. Att skapa Python-variabler
C. Att visa bilder i tkinter
D. Att lagra data strukturerat i en databas

**Rätt svar: D**

A. Ett gränssnitt där program kan kommunicera med en tjänst eller ett system
B. En loop som aldrig slutar
C. En lokal variabel

### 18. Vad är ett GUI?

### 21. En elev ska skapa ett program där användaren kan lägga till, visa och ta bort recept. Vilken struktur är bäst?

### 32. Varför är SQLite bättre än en textfil för ett större register?

    <script>
        const source = document.getElementById("markdown-source").textContent;

        const resultText = document.getElementById("result-text");

        const submitResultButton = document.getElementById("submit-result-button");
        const RESULTS_ENDPOINT = "KListra_in_din_Google_Apps_Script_Web_App_URL_här";
        let latestResult = null;

        function escapeHtml(text) {
            return text
                .replaceAll("&", "&amp;")
                .replaceAll("<", "&lt;")
                .replaceAll(">", "&gt;")
                .replaceAll('"', "&quot;")
                .replaceAll("'", "&#039;");
        }

        function renderInline(text) {
            return escapeHtml(text)
                .replace(/`([^`]+)`/g, "<code>$1</code>");
        }

        function renderPrompt(text) {
            const parts = text.trim().split(/```(?:python)?\n|```/);
            if (parts.length === 1) {
                return renderInline(text.trim());
            }

            let html = "";
            parts.forEach((part, index) => {
                if (!part.trim()) return;
                if (index % 2 === 1) {
                    html += `<pre><code>${escapeHtml(part.trim())}</code></pre>`;
                } else {
                    html += `<p>${renderInline(part.trim())}</p>`;
                }
            });
            return html;
        }

        function parseQuestions(markdown) {
            return markdown
                .split(/\n###\s+/)
                .slice(1)
                .map((block) => {
                    const correct = block.match(/\*\*Rätt svar:\s*([A-D])\*\*/)?.[1];
                    const withoutAnswer = block.replace(/\*\*Rätt svar:\s*[A-D]\*\*/g, "").trim();
                    const firstLineEnd = withoutAnswer.indexOf("\n");
                    const title = withoutAnswer.slice(0, firstLineEnd).trim();
                    const body = withoutAnswer.slice(firstLineEnd + 1).trim();
                    const optionMatch = body.match(/\n?A\.\s+/);
                    const promptExtra = optionMatch ? body.slice(0, optionMatch.index).trim() : "";
                    const optionsText = optionMatch ? body.slice(optionMatch.index).trim() : body;
                    const optionMatches = [...optionsText.matchAll(/(^|\n)([A-D])\.\s+([\s\S]*?)(?=\n[A-D]\.\s+|$)/g)];
                    const options = optionMatches.map((match) => ({
                        letter: match[2],
                        text: match[3].replace(/\s+$/g, "").replace(/ {2,}/g, " ").trim(),
                    }));
                    const number = title.match(/^(\d+)\./)?.[1];
                    const question = title.replace(/^\d+\.\s*/, "");

                    return { number, question, promptExtra, options, correct };
                });
        }

        function renderQuiz() {
            const questions = parseQuestions(source);
            quiz.innerHTML = questions.map((item) => `
                <section class="question" data-question="${item.number}" data-correct="${item.correct}">
                    <h2>${item.number}. ${renderInline(item.question)}</h2>
                    ${item.promptExtra ? renderPrompt(item.promptExtra) : ""}
                    <div class="options">
                        ${item.options.map((option) => `
                            <label data-option="${option.letter}">
                                <input type="radio" name="q${item.number}" value="${option.letter}">
                                <span><strong>${option.letter}.</strong> ${renderInline(option.text)}</span>
                            </label>
                        `).join("")}
                    </div>
                    <p class="feedback"></p>
                </section>
            `).join("");
            summary.textContent = `0 av ${questions.length} rättade`;
        }

        function gradeQuiz() {
            const questions = [...document.querySelectorAll(".question")];
            let correctCount = 0;
            let answeredCount = 0;
            const wrongAnswers = [];

            questions.forEach((question) => {
                const questionNumber = question.dataset.question;
                const correct = question.dataset.correct;
                const selected = question.querySelector("input[type='radio']:checked");
                const feedback = question.querySelector(".feedback");
                const labels = [...question.querySelectorAll("label")];

                labels.forEach((label) => {
                    label.classList.remove("correct", "wrong");
                    if (label.dataset.option === correct) {
                        label.classList.add("correct");
                    }
                });

                if (!selected) {
                    feedback.className = "feedback wrong";
                    feedback.textContent = `Inte besvarad. Rätt svar: ${correct}`;
                    wrongAnswers.push({
                        questionNumber,
                        selected: "inte besvarad",
                        correct,
                    });
                    return;
                }

                answeredCount += 1;

                if (selected.value === correct) {
                    correctCount += 1;
                    feedback.className = "feedback correct";
                    feedback.textContent = `Rätt. Rätt svar: ${correct}`;
                } else {
                    selected.closest("label").classList.add("wrong");
                    feedback.className = "feedback wrong";
                    feedback.textContent = `Fel. Rätt svar: ${correct}`;
                    wrongAnswers.push({
                        questionNumber,
                        selected: selected.value,
                        correct,
                    });
                }
            });

            summary.textContent = `${correctCount} av ${questions.length} rätt, ${answeredCount} besvarade`;
            latestResult = {
                timestamp: new Date().toISOString(),
                score: correctCount,
                total: questions.length,
                answered: answeredCount,
                wrongAnswers,
            };
            renderResultText(correctCount, questions.length, answeredCount, wrongAnswers);
            resultBox.classList.add("is-visible");
            submitStatus.className = "submit-status";
            submitStatus.textContent = "";
            resultBox.scrollIntoView({ behavior: "smooth", block: "start" });
        }

        function renderResultText(correctCount, questionCount, answeredCount, wrongAnswers) {
            const lines = [
                `Totalt antal rätt: ${correctCount} av ${questionCount}`,
                `Antal besvarade frågor: ${answeredCount} av ${questionCount}`,
                "",
            ];

            if (wrongAnswers.length === 0) {
                lines.push("Alla frågor var rätt besvarade.");
            } else {
                lines.push("Felaktiga eller obesvarade frågor:");
                wrongAnswers.forEach((answer) => {
                    lines.push(`Fråga ${answer.questionNumber}: ditt svar: ${answer.selected}, rätt svar: ${answer.correct}`);
                });
            }

            resultText.value = lines.join("\n");
        }

        function resetQuiz() {
            quiz.reset();
            document.querySelectorAll("label").forEach((label) => {
                label.classList.remove("correct", "wrong");
            });
            document.querySelectorAll(".feedback").forEach((feedback) => {
                feedback.className = "feedback";
                feedback.textContent = "";
            });
            summary.textContent = `0 av ${document.querySelectorAll(".question").length} rättade`;
            resultText.value = "";
            latestResult = null;
            submitStatus.className = "submit-status";
            submitStatus.textContent = "";
            resultBox.classList.remove("is-visible");
            window.scrollTo({ top: 0, behavior: "smooth" });
        }

        async function submitAnonymousResult() {
            if (!latestResult) {
                gradeQuiz();
            }

            if (RESULTS_ENDPOINT.includes("KListra_in_din")) {
                submitStatus.className = "submit-status error";
                submitStatus.textContent = "Resultatet kan inte skickas ännu. Lägg in din Google Apps Script Web App-URL i RESULTS_ENDPOINT.";
                return;
            }

            submitResultButton.disabled = true;
            submitStatus.className = "submit-status";
            submitStatus.textContent = "Skickar anonymt resultat...";

            try {
                await fetch(RESULTS_ENDPOINT, {
                    method: "POST",
                    mode: "no-cors",
                    headers: {
                        "Content-Type": "text/plain;charset=utf-8",
                    },
                    body: JSON.stringify(latestResult),
                });

                submitStatus.className = "submit-status success";
                submitStatus.textContent = "Anonymt resultat skickat.";
            } catch (error) {
                submitStatus.className = "submit-status error";
                submitStatus.textContent = "Kunde inte skicka resultatet. Kontrollera Web App-URL och publicering i Google Apps Script.";
            } finally {
                submitResultButton.disabled = false;
            }
        }

        renderQuiz();
        document.getElementById("grade-button").addEventListener("click", gradeQuiz);
        document.getElementById("grade-bottom-button").addEventListener("click", gradeQuiz);
        document.getElementById("reset-button").addEventListener("click", resetQuiz);
        submitResultButton.addEventListener("click", submitAnonymousResult);
    </script>
</body>

</html>
